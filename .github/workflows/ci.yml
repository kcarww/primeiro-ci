name: CI Pipeline

on:
  push:
    branches: [ main, desenvolvimento ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clientes_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up python 3.9
        uses: actions/setup-python@v3
        with:
          python-version: 3.9

      - name: cache pip dependencies
        uses: actions/cache@v3
        with: 
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h "localhost" --silent; do
            echo "Waiting for MySQL to be available..."
            sleep 5
          done
      
      - name: Set up test database
        run: |
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS clientes_db_test;"

      - name: Run tests with coverage
        env:
          DATABASE_HOST: localhost
          DATABASE_USER: root
          DATABASE_PASSWORD: password
          DATABASE_NAME: clientes_db
          DATABASE_TEST_NAME: clientes_db_test
        run: |
          pytest --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-coverage

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up python 3.9
        uses: actions/setup-python@v3
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build application
        run: |
          echo "Building application..."

      - name: Create deployment artifact
        run: |
          tar czf app.tar.gz src/ requirements.txt
      
      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: app-artifact
          path: app.tar.gz